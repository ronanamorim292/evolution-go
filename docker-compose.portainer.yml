version: '3.8'

services:
  evolution-go:
    image: evoapicloud/evolution-go:${EVOLUTION_VERSION:-latest}
    container_name: evolution-go
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-4000}:4000"
    environment:
      # Servidor
      SERVER_PORT: 4000
      CLIENT_NAME: "${CLIENT_NAME:-evolution}"

      # Segurança (OBRIGATÓRIO)
      GLOBAL_API_KEY: "${GLOBAL_API_KEY}"

      # Banco de Dados PostgreSQL (RECOMENDADO)
      POSTGRES_AUTH_DB: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/evogo_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/evogo_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "${DATABASE_SAVE_MESSAGES:-false}"

      # Logs e Debug
      WADEBUG: "${WADEBUG:-INFO}"
      LOGTYPE: "${LOGTYPE:-console}"
      LOG_DIRECTORY: "/app/logs"
      LOG_MAX_SIZE: "${LOG_MAX_SIZE:-100}"
      LOG_MAX_BACKUPS: "${LOG_MAX_BACKUPS:-5}"
      LOG_MAX_AGE: "${LOG_MAX_AGE:-30}"
      LOG_COMPRESS: "${LOG_COMPRESS:-true}"

      # Conexão
      CONNECT_ON_STARTUP: "${CONNECT_ON_STARTUP:-false}"
      WEBHOOKFILES: "${WEBHOOKFILES:-true}"

      # Sistema
      OS_NAME: "${OS_NAME:-Linux}"

      # Eventos (Opcionais)
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      AMQP_URL: "${AMQP_URL:-}"
      AMQP_GLOBAL_ENABLED: "${AMQP_GLOBAL_ENABLED:-false}"
      NATS_URL: "${NATS_URL:-}"
      NATS_GLOBAL_ENABLED: "${NATS_GLOBAL_ENABLED:-false}"

      # Armazenamento de Mídia (Opcional)
      MINIO_ENABLED: "${MINIO_ENABLED:-false}"

      # Proxy (Opcional)
      PROXY_HOST: "${PROXY_HOST:-}"
      PROXY_PORT: "${PROXY_PORT:-}"
      PROXY_USERNAME: "${PROXY_USERNAME:-}"
      PROXY_PASSWORD: "${PROXY_PASSWORD:-}"

      # Eventos
      EVENT_IGNORE_GROUP: "${EVENT_IGNORE_GROUP:-false}"
      EVENT_IGNORE_STATUS: "${EVENT_IGNORE_STATUS:-true}"

      # QR Code
      QRCODE_MAX_COUNT: "${QRCODE_MAX_COUNT:-5}"

    volumes:
      - evolution_data:/app/dbdata
      - evolution_logs:/app/logs
    networks:
      - evolution_network
    depends_on:
      - postgres

  postgres:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - evolution_network

volumes:
  evolution_data:
    driver: local
  evolution_logs:
    driver: local
  postgres_data:
    driver: local

networks:
  evolution_network:
    driver: bridge